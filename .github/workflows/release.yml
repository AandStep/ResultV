name: Release

on:
  push:
    tags:
      - 'v*' # Запускается автоматически при создании тега, например v2.1.1

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          $goBin = "$(go env GOPATH)/bin"
          "$goBin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y
          $makensisCandidates = @(
            "C:\ProgramData\chocolatey\bin\makensis.exe",
            "$env:ProgramFiles\NSIS\makensis.exe",
            "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          )
          $makensis = $null
          foreach ($candidate in $makensisCandidates) {
            if (Test-Path $candidate) {
              $makensis = $candidate
              break
            }
          }
          if (-not $makensis) {
            $found = Get-ChildItem -Path "C:\ProgramData\chocolatey" -Filter "makensis.exe" -File -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              $makensis = $found.FullName
            }
          }
          if (-not $makensis) {
            Write-Error "makensis.exe not found after NSIS installation"
            exit 1
          }
          Split-Path -Parent $makensis | Out-File -FilePath $env:GITHUB_PATH -Append
          "NSISDIR=$(Split-Path -Parent $makensis)" | Out-File -FilePath $env:GITHUB_ENV -Append
          & $makensis /VERSION

      - name: Build Windows app and installer
        shell: pwsh
        run: wails build -clean -nsis -platform windows/amd64

      - name: Validate Windows artifacts
        shell: pwsh
        run: |
          $portable = Get-ChildItem -Path "build/bin" -Filter "*.exe" |
            Where-Object { $_.Name -notlike "*-installer.exe" } |
            Select-Object -First 1
          $installer = Get-ChildItem -Path "build/bin" -Filter "*-installer.exe" | Select-Object -First 1
          if (-not $portable) {
            Write-Error "Portable executable not found in build/bin"
            exit 1
          }
          if (-not $installer) {
            Write-Error "Installer executable not found in build/bin"
            exit 1
          }
          "PORTABLE_PATH=build/bin/$($portable.Name)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "INSTALLER_PATH=build/bin/$($installer.Name)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-windows
          path: |
            ${{ env.PORTABLE_PATH }}
            ${{ env.INSTALLER_PATH }}
          retention-days: 1

  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Parse update.json and format Release Data
        id: prepare_release
        run: |
          node -e "
          const fs = require('fs');
          const update = JSON.parse(fs.readFileSync('update.json', 'utf8'));
          let notesText = update.releaseNotes.replace(/\. /g, '.\n-');
          if (!notesText.startsWith('-')) notesText = '-' + notesText;
          if (notesText.endsWith('-')) notesText = notesText.slice(0, -1);
          const title = update.releaseTitle || 'Bug Fixes & Improvements';
          const releaseBody = 'Что нового в версии ' + update.version + '?\n\n' + notesText + '\n\n🌐 Официальный сайт: ' + new URL(update.downloadUrl).hostname;
          fs.writeFileSync('RELEASE_BODY.txt', releaseBody);
          const fsOut = require('fs');
          fsOut.appendFileSync(process.env.GITHUB_OUTPUT, 'release_name=Result Proxy v' + update.version + ' - ' + title + '\n');
          "

      - name: Download all workflow assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          name: release-assets-windows

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.prepare_release.outputs.release_name }}
          body_path: RELEASE_BODY.txt
          files: release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

