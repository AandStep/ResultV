name: Release

on:
  push:
    tags:
      - 'v*' # Запускается автоматически при создании тега, например v2.1.1

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Build Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish never

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.blockmap
            release/*.dmg
            release/*.AppImage
            release/*.tar.gz
            release/*.zip
            release/latest*.yml
          retention-days: 1

  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Parse update.json and format Release Data
        id: prepare_release
        run: |
          node -e "
          const fs = require('fs');
          const update = JSON.parse(fs.readFileSync('update.json', 'utf8'));
          let notesText = update.releaseNotes.replace(/\. /g, '.\n-');
          if (!notesText.startsWith('-')) notesText = '-' + notesText;
          if (notesText.endsWith('-')) notesText = notesText.slice(0, -1);
          const title = update.releaseTitle || 'Bug Fixes & Improvements';
          const releaseBody = 'Что нового в версии ' + update.version + '?\n\n' + notesText + '\n\n🌐 Официальный сайт: ' + new URL(update.downloadUrl).hostname;
          fs.writeFileSync('RELEASE_BODY.txt', releaseBody);
          const fsOut = require('fs');
          fsOut.appendFileSync(process.env.GITHUB_OUTPUT, 'release_name=Result Proxy v' + update.version + ' - ' + title + '\n');
          "

      - name: Download all workflow assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-assets-*
          merge-multiple: true

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.prepare_release.outputs.release_name }}
          body_path: RELEASE_BODY.txt
          files: release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

